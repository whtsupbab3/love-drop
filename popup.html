<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Love Drop</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="frame">
      <div class="screen-top">
        <span class="stars">★ ✦ ★</span>
        <span class="title">love drop</span>
        <button class="settings-btn" id="settings-btn" title="settings">⚙</button>
      </div>
      <div id="main-view">
        <div class="pic-wrap">
          <img id="pic" alt="" />
          <div class="scanlines"></div>
          <div class="hearts-container" id="hearts"></div>
        </div>
        <div class="msg-wrap">
          <p id="message"></p>
        </div>
      </div>
      <div id="settings-view" class="hidden">
        <div class="settings-row">
          <span class="settings-label">random pop-ups</span>
          <label class="toggle">
            <input type="checkbox" id="enabled-toggle" checked />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
      <div class="screen-bottom">♡ ♡ ♡</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
